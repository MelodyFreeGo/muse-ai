name: aisrzl
description: MUSE - Your AI Personal Style Advisor
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  get: ^4.6.6

  # 网络请求
  dio: ^5.7.0

  # 本地存储
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 图片选择/拍照
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # 权限管理
  permission_handler: ^11.3.1

  # UI 动画
  lottie: ^3.1.2
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0

  # 语音输入
  speech_to_text: ^7.0.0

  # 工具类
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1

  # 位置（天气用）
  geolocator: ^13.0.2

  # 分享功能
  share_plus: ^10.1.2
  screenshot: ^3.0.0

  # HTTP Client（AI API调用）
  http: ^1.2.2

  # 跳转外部链接（淘宝/京东）
  url_launcher: ^6.3.1

  # TTS 音频播放
  just_audio: ^0.9.42

  # 文件路径（分享截图用）
  path_provider: ^2.1.4

  # 字体
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/products.json

